<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SylhetBites - Coming Soon</title>
  <meta name="description" content="SylhetBites website is under construction. Stay tuned for delicious updates!">
  <meta name="robots" content="index, follow">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    /* Reset */
    * {margin:0;padding:0;box-sizing:border-box;}

    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #FFB347, #FFCC33);
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      line-height: 1.5;
      color: #fffccf;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, #FF6B6B, #FFD93D);
      border-radius: 50px;
      transition: 0.3s ease-in-out;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Animation */
    @keyframes fadeIn {
      0% {opacity: 0; transform: translateY(-20px);}
      100% {opacity: 1; transform: translateY(0);}
    }

    /* Background animation bubbles */
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.2;
      animation: float 15s linear infinite;
      background: #fff;
    }

    @keyframes float {
      0% {transform: translateY(100vh) scale(0);}
      50% {opacity:0.4;}
      100% {transform: translateY(-100vh) scale(1);}
    }
  </style>
</head>
<body>
  <!-- Floating bubbles for ultra visual effect -->
  <div class="bubble" style="width:60px;height:60px;left:10%;animation-duration:20s;"></div>
  <div class="bubble" style="width:40px;height:40px;left:30%;animation-duration:15s;"></div>
  <div class="bubble" style="width:80px;height:80px;left:70%;animation-duration:25s;"></div>
  <div class="bubble" style="width:50px;height:50px;left:50%;animation-duration:18s;"></div>

  <div class="container">
    <h1>SylhetBites</h1>
    <p>Our delicious journey is starting soon! Stay tuned for the ultimate food experience in Sylhet.</p>
    <a href="https://debatesylhetbd.com" class="btn" target="_blank">Visit DebateSylhetBD Official Site</a>
  </div>
</body>
</html>
